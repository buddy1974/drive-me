services:
  - type: web
    name: drive-me-api
    runtime: node
    rootDir: apps/api
    buildCommand: yarn install && yarn build && npx prisma generate && npx prisma migrate deploy
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: drive-me-db
          property: connectionString
      - key: PORT
        value: 4000
